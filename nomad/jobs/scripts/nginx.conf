# Upstream services (jail internal IPs)
upstream portfolio_web {
  server 172.16.0.z:5000;
}

upstream portfolio_api {
  server 172.16.0.x:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Redirect HTTP → HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS - Main site (zatara.in, www.zatara.in)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name zatara.in www.zatara.in;

  # SSL Configuration
  ssl_certificate /usr/local/etc/letsencrypt/live/zatara.in/fullchain.pem;
  ssl_certificate_key /usr/local/etc/letsencrypt/live/zatara.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  # Rate limiting
  limit_req zone=general burst=20 nodelay;

  location / {
    proxy_pass http://portfolio_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
  }
}

# HTTPS - API subdomain (api.zatara.in)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.zatara.in;

  ssl_certificate /usr/local/etc/letsencrypt/live/zatara.in/fullchain.pem;
  ssl_certificate_key /usr/local/etc/letsencrypt/live/zatara.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;

  access_log /var/log/nginx/api_access.log;
  error_log /var/log/nginx/api_error.log;

  # Stricter rate limiting for API
  limit_req zone=api burst=50 nodelay;

  location / {
    proxy_pass http://portfolio_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
  }
}
