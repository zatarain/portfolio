# Pot Configuration for Portfolio Jails
#
# Location: /usr/local/etc/pot/pot.conf
# This file contains networking and storage settings for pot/jails

# ============================================
# Network Configuration
# ============================================
# Bridge interface for jails
BRIDGE_ADDR="172.16.0.1/16"

# Use VNET for jails (virtual networking)
# Set to 1 for VNET (recommended for multi-jail)
# Set to 0 for shared network
POT_VNET=1

# Allow port forwarding from host to jails
POT_PUBLISH_PORTS=1

# ============================================
# Storage Configuration
# ============================================
# ZFS pool for jails
POT_ZFS_POOL="zroot"

# Base image for new jails
POT_BASE_IMAGE="13.2-RELEASE"

# ============================================
# Jail Templates
# ============================================
# Default template name
POT_DEFAULT_TEMPLATE="default"

# ============================================
# Logging
# ============================================
POT_LOGLEVEL="info"
POT_LOGDIR="/var/log/pot"

# ============================================
# FreeBSD Release Settings
# ============================================
# Location where FreeBSD releases are stored
POT_DATA_DIR="/var/db/pot"

# ============================================
# Port Publishing
# ============================================
# The host interface to publish ports to
POT_PUBLISH_INTERFACE="auto"

# ============================================
# Advanced Settings
# ============================================
# Enable debugging
# POT_DEBUG=0

# Resource limits per jail (optional)
# POT_CPUSET=""
# POT_MEMORY_LIMIT=""
