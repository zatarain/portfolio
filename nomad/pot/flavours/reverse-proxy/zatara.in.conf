server {
	listen 80;
	server_name ulises.zatara.in api.zatara.in;

	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	server_name ulises.zatara.in;

	ssl_certificate     /opt/custom/var/db/certs/zatara.in.fullchain.pem;
	ssl_certificate_key /opt/custom/var/db/certs/zatara.in.key;

	location / {
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_pass http://127.0.0.1:5000;
	}
}

server {
	listen 443 ssl;
	server_name api.zatara.in;

	ssl_certificate     /opt/custom/var/db/certs/zatara.in.fullchain.pem;
	ssl_certificate_key /opt/custom/var/db/certs/zatara.in.key;

	location / {
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_pass http://127.0.0.1:3000;
	}
}
